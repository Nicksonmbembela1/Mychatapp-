<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mychatapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    
    <!-- SCREEN 1: LOGIN -->
    <div id="loginScreen" class="screen">
      <h1>Mychatapp</h1>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Ingia</button>
      <button onclick="register()">Jisajili</button>
    </div>

    <!-- SCREEN 2: LIST YA CHATS -->
    <div id="chatListScreen" class="screen hidden">
      <div class="header">
        <h2>Mychatapp</h2>
        <button onclick="showSearch()">🔍</button>
        <button onclick="createGroup()">+ Group</button>
      </div>
      <div id="chatList">
        <!-- NICK AI na chats nyingine zitawekwa hapa na JS -->
      </div>
    </div>

    <!-- SCREEN 3: WINDOW YA CHAT -->
    <div id="chatScreen" class="screen hidden">
      <div class="header">
        <button onclick="backToList()"><-</button>
        <h2 id="chatWith">NICK AI</h2>
      </div>
      <div id="messages"></div>
      <div class="inputArea">
        <input type="text" id="messageInput" placeholder="Andika ujumbe...">
        <button onclick="sendMessage()">Tuma</button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
