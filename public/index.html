<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mychatapp</title>

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div id="app">

    <!-- SCREEN 1: LOGIN -->
    <div id="loginScreen" class="screen">
      <h1>Mychatapp</h1>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Ingia</button>
      <button onclick="register()">Jisajili</button>
    </div>

    <!-- SCREEN 2: LIST YA CHATS -->
    <div id="chatListScreen" class="screen hidden">
      <div class="header">
        <img id="myAvatar" src="https://i.pravatar.cc/40" class="avatar" onclick="showProfile()">
        <h2>Mychatapp</h2>
        <div>
          <button onclick="showSearch()">🔍</button>
          <button onclick="showCreateGroup()">👥+</button>
          <button onclick="showSettings()">⚙️</button> <!-- BUTTON YA SETTINGS -->
        </div>
      </div>
      <div id="chatList"></div>
    </div>

    <!-- SCREEN 3: PROFILE YANGU -->
    <div id="profileScreen" class="screen hidden">
      <div class="header">
        <button onclick="backToList()" class="backBtn">⬅</button>
        <h2>Profile Yangu</h2>
      </div>
      <div class="profileBox">
        <img id="profilePreview" src="https://i.pravatar.cc/150" class="bigAvatar">
        <label for="profileInput" class="uploadBtn">Badilisha Picha</label>
        <input type="file" id="profileInput" accept="image/*" onchange="updateProfilePic(event)">
        <h3 id="profileName"></h3>
      </div>
    </div>

    <!-- SCREEN 4: SEARCH USER -->
    <div id="searchScreen" class="screen hidden">
      <div class="header">
        <button onclick="backToList()" class="backBtn">⬅</button>
        <h2>Tafuta User</h2>
      </div>
      <input type="text" id="searchInput" placeholder="Andika username...">
      <button onclick="searchUser()">Tafuta</button>
      <div id="searchResults"></div>
    </div>

    <!-- SCREEN 5: KUUNDA GROUP -->
    <div id="groupScreen" class="screen hidden">
      <div class="header">
        <button onclick="backToList()" class="backBtn">⬅</button>
        <h2>Unda Group</h2>
      </div>
      <input type="text" id="groupName" placeholder="Jina la Group">
      <input type="text" id="groupMembers" placeholder="Weka usernames: juma,aisha">
      <button onclick="createGroup()">Unda Group</button>
    </div>

    <!-- SCREEN 6: WINDOW YA CHAT -->
    <div id="chatScreen" class="screen hidden">
      <div class="header chatHeader">
        <button onclick="backToList()" class="backBtn">⬅</button>
        <img id="chatAvatar" src="https://i.pravatar.cc/40" class="avatar">
        <h2 id="chatWith">NICK AI</h2>
      </div>
      <div id="messages"></div>
      <div class="inputArea">
        <input type="text" id="messageInput" placeholder="Andika ujumbe...">
        <button onclick="sendMessage()">Tuma</button>
      </div>
    </div>

    <!-- SCREEN 7: SETTINGS MPYA -->
    <div id="settingsScreen" class="screen hidden">
      <div class="header">
        <button onclick="backToList()" class="backBtn">⬅</button>
        <h2>Settings</h2>
      </div>
      <div class="settingsList">
        <div class="settingItem" onclick="showProfile()">👤 Profile Yangu</div>
        <div class="settingItem" onclick="logout()">🚪 Logout</div>
        <div class="settingItem danger" onclick="deleteAccount()">🗑️ Delete My Account</div>
      </div>
    </div>

  </div>

  <!-- LIBRARIES ZA SUPABASE - ZILIZOKUWA ZINAKOSA -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="env.js"></script>
  <script src="app.js?v=6"></script> <!-- ?v=6 KUVUNJA CACHE -->
</body>
</html>
